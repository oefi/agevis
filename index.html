<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgeVis - AoE2 Replay Visualizer</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://pixijs.download/release/pixi.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        body { margin: 0; background: #1e1e1e; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #2d2d2d; padding: 20px; border-right: 2px solid #444; display: flex; flex-direction: column; z-index: 10; }
        #main-view { flex-grow: 1; display: flex; flex-direction: column; background: #111; position: relative; }
        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #playback-bar { height: 60px; background: #222; border-top: 2px solid #444; display: flex; align-items: center; padding: 0 20px; gap: 15px; z-index: 10; }
        #timeline { flex-grow: 1; cursor: pointer; }
        .drag-over { background: #3d3d3d !important; border: 2px dashed #f39c12 !important; }
        .stats-box { background: #1a1a1a; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 15px; }
        .log { color: #aaa; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; flex-grow: 1; margin-top: auto; border-top: 2px solid #444; margin-bottom: 0; padding-top: 10px; }
        button { background: #f39c12; color: #111; border: none; padding: 6px 12px; font-weight: bold; cursor: pointer; border-radius: 3px; }
        button:hover { background: #e67e22; }
        #btn-speed { background: #444; color: white; width: 45px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top:0; color: #f39c12; border-bottom: 2px solid #444; padding-bottom: 10px;">AgeVis Engine</h2>
        <div id="dropzone" style="padding: 15px; border: 2px dashed #666; text-align: center; margin-bottom: 15px; cursor: pointer; transition: 0.2s;">
            <span id="status" style="color: #f39c12; font-weight: bold;">Initializing Engine...</span>
        </div>
        
        <div class="stats-box" id="p1-card" style="border-left: 4px solid #0000FF; display: none;">
            <strong id="p1-name" style="font-size: 16px;">P1</strong> <span id="p1-civ" style="color: #aaa; font-size: 12px;"></span>
            <hr style="border: 1px solid #333; margin: 8px 0;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px;">
                <div>Pop (Alive/Total):</div> <div id="p1-pop" style="text-align: right; color: #2ecc71;">0 / 0</div>
                <div>Buildings:</div> <div id="p1-bld" style="text-align: right; color: #f39c12;">0 / 0</div>
            </div>
        </div>

        <div class="stats-box" id="p2-card" style="border-left: 4px solid #FF0000; display: none;">
            <strong id="p2-name" style="font-size: 16px;">P2</strong> <span id="p2-civ" style="color: #aaa; font-size: 12px;"></span>
            <hr style="border: 1px solid #333; margin: 8px 0;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px;">
                <div>Pop (Alive/Total):</div> <div id="p2-pop" style="text-align: right; color: #2ecc71;">0 / 0</div>
                <div>Buildings:</div> <div id="p2-bld" style="text-align: right; color: #f39c12;">0 / 0</div>
            </div>
        </div>

        <div class="log" id="output"></div>
    </div>

    <div id="main-view">
        <div id="canvas-container"></div>
        <div id="playback-bar">
            <button id="btn-play">▶ Play</button>
            <button id="btn-speed">1x</button>
            <span id="time-display" style="font-family: monospace; font-size: 14px; width: 65px; color: #2ecc71;">00:00:00</span>
            <input type="range" id="timeline" min="0" max="100" value="0" disabled>
        </div>
    </div>

    <script>
        // --- 1. GLOBALS & CONSTANTS ---
        const CANVAS_SIZE = 750;
        const app = new PIXI.Application(); 
        const mapContainer = new PIXI.Container();
        
        const aoeColors = { 1: 0x0000FF, 2: 0xFF0000, 3: 0x00FF00, 4: 0xFFFF00, 5: 0x00FFFF, 6: 0xFF00FF, 7: 0x808080, 8: 0xFFA500, null: 0xFFFFFF };
        
        let pyodideInstance, ageVisData = null, entityPaths = {};
        let AOE_DAT = {}; 
        const FALLBACK_STAT = { render_shape: "circle", speed: 1.1, size: 2 };

        let isPlaying = false, currentPlayTime = 0, lastFrameTime = 0;
        let playbackSpeed = 1; 
        const speedCycle = [1, 2, 4, 8];
        let staticBackground;
        let mapScale = 1;

        // --- 2. SYSTEM LOGGER ---
        function logSystem(message, type = "info") {
            const out = document.getElementById('output');
            const colors = { info: "#3498db", success: "#2ecc71", error: "#e74c3c", warning: "#f39c12" };
            const time = new Date().toLocaleTimeString([], { hour12: false });
            out.innerHTML = `<span style="color: #777;">[${time}]</span> <span style="color: ${colors[type]};">${message}</span><br>` + out.innerHTML;
        }

        // --- 3. ENVIRONMENT BOOT ---
        async function initEnvironment() {
            const stat = document.getElementById('status');
            try {
                logSystem("Booting PixiJS v8 WebGL engine...", "info");
                await app.init({ width: CANVAS_SIZE, height: CANVAS_SIZE, backgroundColor: 0x111111 });
                document.getElementById('canvas-container').appendChild(app.canvas);
                app.stage.addChild(mapContainer);

                logSystem("Fetching Genie Engine Data (3MB)...", "info");
                const res = await fetch('https://raw.githubusercontent.com/SiegeEngineers/aoe2techtree/master/data/data.json');
                const rawEngineData = await res.json();
                
                const unitsData = rawEngineData.data?.units || rawEngineData.units || {};
                const buildingsData = rawEngineData.data?.buildings || rawEngineData.buildings || {};

                Object.values(unitsData).forEach(u => AOE_DAT[u.ID || u.id] = { ...u, render_shape: 'circle', size: 2 });
                Object.values(buildingsData).forEach(b => AOE_DAT[b.ID || b.id] = { ...b, render_shape: 'square', size: 5 });

                logSystem("Initializing Python WebAssembly...", "info");
                pyodideInstance = await loadPyodide();
                await pyodideInstance.loadPackage("micropip");
                
                logSystem("Bypassing PyPI tarball for aoc-mgz...", "warning");
                await pyodideInstance.runPythonAsync(`
import micropip
import json
from pyodide.http import pyfetch
import tarfile
import io
import sys
import sysconfig

await micropip.install(["construct==2.10.67"])

response = await pyfetch("https://pypi.org/pypi/mgz/json")
data = await response.json()
url = data["urls"][0]["url"]
version = data["info"]["version"]

tar_response = await pyfetch(url)
tar_data = await tar_response.bytes()
tar = tarfile.open(fileobj=io.BytesIO(tar_data), mode="r:gz")
site_pkgs = sysconfig.get_paths()["purelib"]
tar.extractall(site_pkgs)

sys.path.append(f"{site_pkgs}/mgz-{version}")
                `);
                
                stat.innerText = "System Ready. Drop .aoe2record";
                stat.style.color = "#2ecc71";
                document.getElementById('dropzone').style.borderColor = "#2ecc71";
                logSystem("System initialized and ready.", "success");
            } catch (error) {
                stat.innerText = "Engine Boot Failed.";
                stat.style.color = "#e74c3c";
                logSystem(`Initialization Error: ${error.message}`, "error");
            }
        }
        initEnvironment();

        // --- 4. DROPZONE & PYTHON PARSER ---
        const dropzone = document.getElementById('dropzone');
        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); };
        dropzone.ondragleave = () => dropzone.classList.remove('drag-over');
        dropzone.ondrop = async (e) => {
            e.preventDefault(); 
            dropzone.classList.remove('drag-over');
            
            if (!pyodideInstance) { logSystem("Engine is not ready yet.", "warning"); return; }

            const file = e.dataTransfer.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.aoe2record')) {
                logSystem(`Invalid file: ${file.name}`, "error"); return;
            }

            logSystem(`Loading ${file.name}...`, "info");
            document.getElementById('status').innerText = "Parsing binary... Please wait.";
            document.getElementById('status').style.color = "#f39c12";

            try {
                const arrayBuffer = await file.arrayBuffer();
                pyodideInstance.FS.writeFile('/replay.rec', new Uint8Array(arrayBuffer));

                const pyCode = `
import json
from mgz.summary import Summary

try:
    with open('/replay.rec', 'rb') as f:
        summary = Summary(f)
        init_objs = [{"id": o.get("instance_id"), "p": o.get("player_number"), "x": o.get("x"), "y": o.get("y"), "type_id": o.get("object_type")} for o in summary.get_objects() if o.get("instance_id") is not None]
        
        commands = []
        for cmd in summary.get_commands():
            if cmd['type'] in ['move', 'build'] and 'position' in cmd and 'object_ids' in cmd:
                commands.append({"t": cmd['timestamp'], "type": "move", "ids": cmd['object_ids'], "x": cmd['position'][0], "y": cmd['position'][1]})
            elif cmd['type'] == 'delete' and 'object_ids' in cmd:
                commands.append({"t": cmd['timestamp'], "type": "delete", "ids": cmd['object_ids']})
            elif cmd['type'] == 'resign':
                commands.append({"t": cmd['timestamp'], "type": "resign", "p": cmd['player_id']})

        map_data = summary.get_map()
        optimized_tiles = [[t['terrain_type'], t['elevation']] for t in map_data['tiles']]

        payload = {
            "duration": summary.get_duration(),
            "map_size": map_data['size'],
            "tiles": optimized_tiles,
            "players": [{"name": p['name'], "civ": p['civilization'], "color": p['color_id']} for p in summary.get_players()],
            "objects": init_objs,
            "commands": commands
        }
    result = json.dumps({"status": "success", "data": payload})
except Exception as e:
    result = json.dumps({"status": "error", "message": str(e)})
result
                `;

                const parsed = JSON.parse(pyodideInstance.runPython(pyCode));
                
                if (parsed.status === "success") {
                    ageVisData = parsed.data;
                    logSystem("Binary parsed. Compiling kinematics and terrain...", "info");
                    
                    compileEntityPaths();
                    calculateCombatDeaths();
                    generateProceduralMap();
                    initAgeVisUI();
                    
                    logSystem(`Engine Ready. Tracking ${Object.keys(entityPaths).length} entities.`, "success");
                    document.getElementById('status').innerText = "Ready. Drop another to swap.";
                    document.getElementById('status').style.color = "#2ecc71";
                } else {
                    throw new Error(parsed.message); 
                }
            } catch (err) {
                logSystem(`Parser Error: ${err.message}`, "error");
                document.getElementById('status').innerText = "Parsing Failed";
                document.getElementById('status').style.color = "#e74c3c";
            }
        };

        // --- 5. ENGINE MATH HELPERS ---
        function getPositionAtTime(path, targetTimeMs) {
            if (!path || path.length === 0) return null;
            let pos = { x: path[0].x, y: path[0].y, p: path[0].p };
            for (let i = 0; i < path.length - 1; i++) {
                if (targetTimeMs >= path[i].t && targetTimeMs <= path[i+1].t) {
                    const dt = path[i+1].t - path[i].t;
                    const prog = dt === 0 ? 1 : (targetTimeMs - path[i].t) / dt;
                    pos.x = path[i].x + (path[i+1].x - path[i].x) * prog;
                    pos.y = path[i].y + (path[i+1].y - path[i].y) * prog;
                    return { pos, isMoving: true, lastT: path[i].t };
                } else if (targetTimeMs > path[i+1].t) {
                    pos.x = path[i+1].x; pos.y = path[i+1].y;
                }
            }
            return { pos, isMoving: false, lastT: path[path.length - 1].t };
        }

        // --- 6. COMPILERS & CULLING ---
        function compileEntityPaths() {
            Object.values(entityPaths).forEach(ep => { if (ep.gfx) ep.gfx.destroy(); });
            entityPaths = {};
            mapScale = CANVAS_SIZE / ageVisData.map_size;

            ageVisData.objects.forEach(obj => {
                if (obj.x === undefined || obj.y === undefined) return;
                const stats = AOE_DAT[obj.type_id] || FALLBACK_STAT;
                
                const g = new PIXI.Graphics();
                mapContainer.addChild(g);
                
                entityPaths[obj.id] = {
                    path: [{ t: 0, x: obj.x, y: obj.y, p: obj.p, speed: stats.Speed || stats.speed || 1.1, shape: stats.render_shape, size: stats.size }],
                    gfx: g,         
                    drawn: false    
                };
            });

            const sortedCmds = ageVisData.commands.sort((a, b) => a.t - b.t);
            sortedCmds.forEach(cmd => {
                if (cmd.type === 'resign') {
                    Object.values(entityPaths).forEach(ep => { if (ep.path.length > 0 && ep.path[0].p === cmd.p) ep.path.deathTime = Math.min(ep.path.deathTime || Infinity, cmd.t); });
                    return;
                }
                if (cmd.type === 'delete') {
                    cmd.ids.forEach(id => { if (entityPaths[id]) entityPaths[id].path.deathTime = cmd.t; });
                    return;
                }

                cmd.ids.forEach(unitId => {
                    if (!entityPaths[unitId]) return;
                    const path = entityPaths[unitId].path;
                    let lastNode = path[path.length - 1];

                    if (lastNode.t > cmd.t) {
                        const prevNode = path[path.length - 2] || path[0];
                        const dt = lastNode.t - prevNode.t;
                        const prog = dt === 0 ? 1 : (cmd.t - prevNode.t) / dt;
                        lastNode.t = cmd.t;
                        lastNode.x = prevNode.x + (lastNode.x - prevNode.x) * prog;
                        lastNode.y = prevNode.y + (lastNode.y - prevNode.y) * prog;
                    } else if (lastNode.t < cmd.t) {
                        path.push({ t: cmd.t, x: lastNode.x, y: lastNode.y, p: lastNode.p, speed: lastNode.speed, shape: lastNode.shape, size: lastNode.size });
                        lastNode = path[path.length - 1];
                    }

                    const dist = Math.sqrt(Math.pow(cmd.x - lastNode.x, 2) + Math.pow(cmd.y - lastNode.y, 2));
                    const travelMs = (dist / (lastNode.speed > 0 ? lastNode.speed : 1.1)) * 1000;
                    path.push({ t: cmd.t + travelMs, x: cmd.x, y: cmd.y, p: lastNode.p, speed: lastNode.speed, shape: lastNode.shape, size: lastNode.size });
                });
            });
        }

        function calculateCombatDeaths() {
            const ids = Object.keys(entityPaths);
            ids.forEach(id => {
                const path = entityPaths[id].path;
                if (path.length === 0 || path.deathTime) return;
                const lastNode = path[path.length - 1];
                if (lastNode.t > ageVisData.duration - 15000) return;

                for (let i = 0; i < ids.length; i++) {
                    const ePath = entityPaths[ids[i]].path; 
                    if (ids[i] === id || ePath[0].p === lastNode.p || ePath[0].p === null) continue;
                    if (ePath.deathTime && ePath.deathTime < lastNode.t) continue;
                    
                    const eState = getPositionAtTime(ePath, lastNode.t);
                    if (!eState) continue;
                    
                    if (Math.sqrt(Math.pow(lastNode.x - eState.pos.x, 2) + Math.pow(lastNode.y - eState.pos.y, 2)) <= 8) {
                        path.deathTime = lastNode.t + 3000; 
                        break;
                    }
                }
            });
        }

        // --- 7. TERRAIN GENERATOR ---
        function generateProceduralMap() {
            if (staticBackground) { app.stage.removeChild(staticBackground); staticBackground.destroy(true); }
            
            const offscreen = document.createElement('canvas');
            offscreen.width = CANVAS_SIZE; offscreen.height = CANVAS_SIZE;
            const ctx = offscreen.getContext('2d');
            
            const size = ageVisData.map_size;
            const tileSize = CANVAS_SIZE / size;

            const terrainColors = {
                0: '#3b823b', 1: '#2A3B9A', 2: '#1E592F', 9: '#3d7031', 
                10: '#112E0E', 12: '#82643a', 13: '#6e522b', 14: '#ab8854', 
                19: '#183815', 22: '#1A2B15', 24: '#999999', default: '#4a5e3d'
            };

            let tileIndex = 0;
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    const tile = ageVisData.tiles[tileIndex];
                    const cX = x * tileSize, cY = CANVAS_SIZE - ((y + 1) * tileSize);

                    ctx.fillStyle = terrainColors[tile[0]] || terrainColors.default;
                    ctx.fillRect(cX, cY, tileSize, tileSize);

                    if (tile[1] > 0) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${tile[1] * 0.12})`;
                        ctx.fillRect(cX, cY, tileSize, tileSize);
                    }
                    tileIndex++;
                }
            }

            const texture = PIXI.Texture.from(offscreen);
            staticBackground = new PIXI.Sprite(texture);
            app.stage.addChildAt(staticBackground, 0); 
        }

        // --- 8. UI & PLAYBACK ---
        function initAgeVisUI() {
            const tl = document.getElementById('timeline');
            tl.max = ageVisData.duration; tl.disabled = false; tl.value = 0;
            
            if (ageVisData.players.length >= 2) {
                [0, 1].forEach(i => {
                    const p = ageVisData.players[i], cardNum = i+1;
                    document.getElementById(`p${cardNum}-card`).style.display = 'block';
                    document.getElementById(`p${cardNum}-card`).style.borderLeftColor = '#' + (aoeColors[p.color] || 0xFFFFFF).toString(16).padStart(6, '0');
                    document.getElementById(`p${cardNum}-name`).innerText = p.name;
                    document.getElementById(`p${cardNum}-civ`).innerText = `(${p.civ})`;
                });
            }

            tl.addEventListener('input', (e) => { currentPlayTime = parseInt(e.target.value); renderMapState(currentPlayTime); });
            
            const btnPlay = document.getElementById('btn-play');
            const newBtnPlay = btnPlay.cloneNode(true);
            btnPlay.parentNode.replaceChild(newBtnPlay, btnPlay);
            
            newBtnPlay.addEventListener('click', () => {
                isPlaying = !isPlaying; newBtnPlay.innerText = isPlaying ? "⏸ Pause" : "▶ Play";
                if (isPlaying) { lastFrameTime = performance.now(); requestAnimationFrame(playbackLoop); }
            });

            const btnSpeed = document.getElementById('btn-speed');
            const newBtnSpeed = btnSpeed.cloneNode(true);
            btnSpeed.parentNode.replaceChild(newBtnSpeed, btnSpeed);

            newBtnSpeed.addEventListener('click', () => {
                playbackSpeed = speedCycle[(speedCycle.indexOf(playbackSpeed) + 1) % speedCycle.length];
                newBtnSpeed.innerText = playbackSpeed + 'x';
                newBtnSpeed.style.color = playbackSpeed === 8 ? '#f39c12' : 'white';
            });

            renderMapState(0);
        }

        function playbackLoop(ts) {
            if (!isPlaying) return;
            currentPlayTime += (ts - lastFrameTime) * playbackSpeed;
            lastFrameTime = ts;
            
            if (currentPlayTime > ageVisData.duration) { 
                currentPlayTime = ageVisData.duration; 
                isPlaying = false; 
                document.getElementById('btn-play').innerText = "▶ Play"; 
            }
            
            document.getElementById('timeline').value = currentPlayTime;
            renderMapState(currentPlayTime);
            
            if (isPlaying) requestAnimationFrame(playbackLoop);
        }

        // --- 9. RENDERER & TELEMETRY ---
        function renderMapState(timeMs) {
            if (!ageVisData) return;
            document.getElementById('time-display').innerText = new Date(timeMs).toISOString().substr(11, 8);
            let stats = { 1: { pA: 0, pT: 0, bA: 0, bT: 0 }, 2: { pA: 0, pT: 0, bA: 0, bT: 0 } };

            Object.keys(entityPaths).forEach(id => {
                const ep = entityPaths[id];
                const path = ep.path;
                const base = path[0];
                const g = ep.gfx;
                
                const isDead = path.deathTime && timeMs >= path.deathTime;
                
                if (timeMs >= base.t && (base.p === 1 || base.p === 2)) {
                    const isBld = base.shape === 'square' || base.shape === 'building';
                    if (isBld) { stats[base.p].bT++; if (!isDead) stats[base.p].bA++; } 
                    else { stats[base.p].pT++; if (!isDead) stats[base.p].pA++; }
                }

                if (isDead || timeMs < base.t) { g.visible = false; return; }
                g.visible = true;

                if (!ep.drawn) {
                    const rSize = Math.max(base.size * (mapScale / 4), 2);
                    if (base.shape === 'square' || base.shape === 'building') {
                        g.rect(-rSize, -rSize, rSize * 2, rSize * 2);
                    } else {
                        g.circle(0, 0, rSize);
                    }
                    g.fill(aoeColors[base.p] || 0x666666);
                    ep.drawn = true;
                }

                const state = getPositionAtTime(path, timeMs);
                let alpha = 1.0;
                
                if (!state.isMoving && timeMs > state.lastT) {
                    const idle = timeMs - state.lastT;
                    if (idle > 60000) alpha = Math.max(0.3, 1.0 - ((idle - 60000) / 60000));
                }

                g.alpha = alpha;
                g.x = state.pos.x * mapScale;
                g.y = CANVAS_SIZE - (state.pos.y * mapScale);
            });

            if (document.getElementById('p1-card').style.display === 'block') {
                document.getElementById('p1-pop').innerText = `${stats[1].pA} / ${stats[1].pT}`;
                document.getElementById('p1-bld').innerText = `${stats[1].bA} / ${stats[1].bT}`;
                document.getElementById('p2-pop').innerText = `${stats[2].pA} / ${stats[2].pT}`;
                document.getElementById('p2-bld').innerText = `${stats[2].bA} / ${stats[2].bT}`;
            }
        }
    </script>
</body>
</html>
