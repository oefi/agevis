<!DOCTYPE html>
<html>
<head>
    <script src="https://pixijs.download/release/pixi.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        body { margin: 0; background: #1e1e1e; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout Grid */
        #sidebar { width: 350px; background: #2d2d2d; padding: 20px; border-right: 2px solid #444; display: flex; flex-direction: column; }
        #main-view { flex-grow: 1; display: flex; flex-direction: column; }
        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #111; }
        
        /* UI Elements */
        #playback-bar { height: 60px; background: #222; border-top: 2px solid #444; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        #timeline { flex-grow: 1; cursor: pointer; }
        .drag-over { background: #3d3d3d !important; border: 2px dashed #f39c12; }
        
        /* Data Readouts */
        .stats-box { background: #1a1a1a; padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 14px; }
        .log { color: #2ecc71; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; max-height: 200px;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top:0; color: #f39c12;">AoE2 Visualizer</h2>
        <div id="dropzone" style="padding: 20px; border: 2px dashed #666; text-align: center; margin-bottom: 20px;">
            <span id="status">Loading Python...</span>
        </div>
        
        <div class="stats-box" id="match-info">Match Info: Pending...</div>
        <div class="stats-box log" id="output">System Log...</div>
    </div>

    <div id="main-view">
        <div id="canvas-container"></div>
        
        <div id="playback-bar">
            <button id="btn-play">▶ Play</button>
            <span id="time-display">00:00</span>
            <input type="range" id="timeline" min="0" max="100" value="0" disabled>
        </div>
    </div>

    <script>
// 1. Initialize Canvas Environment
    const CANVAS_SIZE = 650;
    const app = new PIXI.Application({ width: CANVAS_SIZE, height: CANVAS_SIZE, backgroundColor: 0x2a2a2a });
    document.getElementById('canvas-container').appendChild(app.view);
    
    const mapContainer = new PIXI.Container();
    app.stage.addChild(mapContainer);

    const aoeColors = { 1: 0x0000FF, 2: 0xFF0000, 3: 0x00FF00, 4: 0xFFFF00, 5: 0x00FFFF, 6: 0xFF00FF, 7: 0x808080, 8: 0xFFA500, null: 0xFFFFFF };

    let pyodideInstance;
    let ageVisData = null; 
    let entityPaths = {}; // Stores pre-calculated lifecycles: { entityId: [{t, x, y}, ...] }
    
    // Playback State
    let isPlaying = false;
    let currentPlayTime = 0;
    let lastFrameTime = 0;
    const playbackSpeed = 5; // 5x speed multiplier

    // 2. Boot Pyodide
    async function initPython() {
        pyodideInstance = await loadPyodide();
        await pyodideInstance.loadPackage("micropip");
        await pyodideInstance.pyimport("micropip").install("aoc-mgz");
        
        const stat = document.getElementById('status');
        stat.innerText = "AgeVis Engine Ready. Drop .aoe2record";
        stat.style.color = "#2ecc71";
        document.getElementById('dropzone').style.borderColor = "#2ecc71";
    }
    initPython();

    // 3. Drop & Parse Engine
    const dropzone = document.getElementById('dropzone');
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); };
    dropzone.ondragleave = () => dropzone.classList.remove('drag-over');
    dropzone.ondrop = async (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag-over');
        if (!pyodideInstance) return;
        
        document.getElementById('output').innerText = "AgeVis: Compiling binary paths...";
        const file = e.dataTransfer.files[0];
        const arrayBuffer = await file.arrayBuffer();
        pyodideInstance.FS.writeFile('/replay.rec', new Uint8Array(arrayBuffer));

        const pyCode = `
import json
from mgz.summary import Summary

try:
    with open('/replay.rec', 'rb') as f:
        summary = Summary(f)
        
        init_objs = [{"id": o.get("instance_id"), "p": o.get("player_number"), "x": o.get("x"), "y": o.get("y")} for o in summary.get_objects() if o.get("instance_id") is not None]
        
        commands = []
        for cmd in summary.get_commands():
            if cmd['type'] in ['move', 'build'] and 'position' in cmd and 'object_ids' in cmd:
                commands.append({
                    "t": cmd['timestamp'],
                    "ids": cmd['object_ids'],
                    "x": cmd['position'][0],
                    "y": cmd['position'][1]
                })

        payload = {
            "duration": summary.get_duration(),
            "map_size": summary.get_map()['size'],
            "players": [{"name": p['name'], "civ": p['civilization'], "color": p['color_id']} for p in summary.get_players()],
            "objects": init_objs,
            "commands": commands
        }
    result = json.dumps({"status": "success", "data": payload})
except Exception as e:
    result = json.dumps({"status": "error", "message": str(e)})
result
        `;

        const parsedData = JSON.parse(pyodideInstance.runPython(pyCode));
        if (parsedData.status === "success") {
            ageVisData = parsedData.data;
            compileEntityPaths();
            initAgeVisUI();
            document.getElementById('output').innerText = "Path Compilation Complete.\nEntities Tracked: " + Object.keys(entityPaths).length;
        } else {
            document.getElementById('output').innerText = "Error: " + parsedData.message;
        }
    };

    // 4. Pre-Compile Entity Paths (O(1) Render Prep)
    function compileEntityPaths() {
        entityPaths = {};
        
        // A. Register initial positions (Time = 0)
        ageVisData.objects.forEach(obj => {
            if (obj.x === undefined || obj.y === undefined) return;
            entityPaths[obj.id] = [{ t: 0, x: obj.x, y: obj.y, p: obj.p }];
        });

        // B. Append movement commands chronologically
        // Note: AoE2 movement speed requires complex math. 
        // For this prototype, we assume units reach their destination exactly when the next command is issued, or 10s later.
        ageVisData.commands.forEach(cmd => {
            cmd.ids.forEach(unitId => {
                if (!entityPaths[unitId]) return;
                
                const lastNode = entityPaths[unitId][entityPaths[unitId].length - 1];
                const player = lastNode.p;
                
                // Add the destination node (assuming arrival roughly 10 seconds later for visualization)
                entityPaths[unitId].push({ t: cmd.t + 10000, x: cmd.x, y: cmd.y, p: player });
            });
        });
    }

    // 5. AgeVis Scrubber & Playback UI
    function initAgeVisUI() {
        const timeline = document.getElementById('timeline');
        timeline.max = ageVisData.duration;
        timeline.disabled = false;
        timeline.value = 0;

        timeline.addEventListener('input', (e) => {
            currentPlayTime = parseInt(e.target.value);
            renderMapState(currentPlayTime);
            updateTimeDisplay(currentPlayTime);
        });

        const playBtn = document.getElementById('btn-play');
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? "⏸ Pause" : "▶ Play";
            if (isPlaying) {
                lastFrameTime = performance.now();
                requestAnimationFrame(playbackLoop);
            }
        });

        renderMapState(0);
    }

    function updateTimeDisplay(ms) {
        document.getElementById('time-display').innerText = new Date(ms).toISOString().substr(11, 8);
    }

    // 6. Playback Animation Loop
    function playbackLoop(timestamp) {
        if (!isPlaying) return;
        
        const deltaMs = timestamp - lastFrameTime;
        lastFrameTime = timestamp;
        
        currentPlayTime += (deltaMs * playbackSpeed);
        
        if (currentPlayTime > ageVisData.duration) {
            currentPlayTime = ageVisData.duration;
            isPlaying = false;
            document.getElementById('btn-play').innerText = "▶ Play";
        }

        document.getElementById('timeline').value = currentPlayTime;
        updateTimeDisplay(currentPlayTime);
        renderMapState(currentPlayTime);

        if (isPlaying) requestAnimationFrame(playbackLoop);
    }

    // 7. Time-Series Lerp Renderer
    function renderMapState(targetTimeMs) {
        if (!ageVisData) return;
        mapContainer.removeChildren();
        const scale = CANVAS_SIZE / ageVisData.map_size; 
        
        const bg = new PIXI.Graphics();
        bg.beginFill(0x334433).drawRect(0, 0, CANVAS_SIZE, CANVAS_SIZE).endFill();
        mapContainer.addChild(bg);

        // Iterate all tracked entities and interpolate their current position
        Object.keys(entityPaths).forEach(id => {
            const path = entityPaths[id];
            if (path.length === 0) return;

            let currentPos = { x: path[0].x, y: path[0].y, p: path[0].p };

            // Find bracketing nodes for Lerp
            for (let i = 0; i < path.length - 1; i++) {
                const nodeA = path[i];
                const nodeB = path[i+1];

                if (targetTimeMs >= nodeA.t && targetTimeMs <= nodeB.t) {
                    // Object is currently moving between nodeA and nodeB
                    const progress = (targetTimeMs - nodeA.t) / (nodeB.t - nodeA.t);
                    currentPos.x = nodeA.x + (nodeB.x - nodeA.x) * progress;
                    currentPos.y = nodeA.y + (nodeB.y - nodeA.y) * progress;
                    break;
                } else if (targetTimeMs > nodeB.t) {
                    // Object has passed this waypoint, snap to it
                    currentPos.x = nodeB.x;
                    currentPos.y = nodeB.y;
                }
            }

            // Draw Entity
            const dot = new PIXI.Graphics();
            const color = aoeColors[currentPos.p] || 0x666666; 
            const canvasX = currentPos.x * scale;
            const canvasY = CANVAS_SIZE - (currentPos.y * scale);
            
            dot.beginFill(color).drawCircle(canvasX, canvasY, currentPos.p ? 3 : 1).endFill();
            mapContainer.addChild(dot);
        });
    }
</body>
</html>
