<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgeVis — AoE2 Replay Visualizer</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://pixijs.download/v8.9.2/pixi.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; background: #1e1e1e; color: #ddd; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* ── Sidebar ── */
        #sidebar { width: 340px; min-width: 340px; background: #2a2a2a; padding: 16px; border-right: 2px solid #3a3a3a; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        #sidebar h2 { margin: 0 0 4px; color: #f39c12; font-size: 17px; border-bottom: 1px solid #3a3a3a; padding-bottom: 10px; }
        .badge-1v1 { display: inline-block; background: #2a1a00; color: #f39c12; border: 1px solid #f39c12; border-radius: 3px; font-size: 10px; font-weight: bold; padding: 1px 5px; vertical-align: middle; margin-left: 6px; letter-spacing: 0.5px; }

        /* ── Dropzone ── */
        #dropzone { padding: 14px 12px; border: 2px dashed #555; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; border-radius: 6px; background: #222; }
        #dropzone.drag-over { background: #3d3d3d; border-color: #f39c12; }
        #status { color: #f39c12; font-weight: bold; display: block; margin-bottom: 4px; font-size: 14px; }
        #dropzone small { color: #555; font-size: 11px; }

        /* ── Player cards ── */
        .card { background: #1a1a1a; padding: 10px 12px; border-radius: 4px; border-left: 4px solid #555; display: none; }
        .card-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
        .card-name { font-size: 15px; font-weight: bold; }
        .card-civ { color: #777; font-size: 11px; }
        .card-stats { display: grid; grid-template-columns: 1fr auto; gap: 4px 12px; font-size: 12px; color: #aaa; }
        .card-stats .val { text-align: right; font-family: monospace; }
        .val-pop { color: #2ecc71; }
        .val-bld { color: #f39c12; }
        .val-apm { color: #3498db; }

        /* ── Log ── */
        .log-toolbar { display: flex; align-items: center; gap: 6px; padding-top: 6px; border-top: 1px solid #3a3a3a; flex-shrink: 0; }
        .log-toolbar span { color: #666; font-size: 11px; font-family: monospace; flex-grow: 1; }
        .log-btn { background: #333; color: #888; border: 1px solid #484848; padding: 2px 8px; font-size: 11px; font-weight: normal; border-radius: 3px; cursor: pointer; }
        .log-btn:hover { background: #444; color: #ccc; }
        #log { color: #888; font-family: monospace; font-size: 11.5px; white-space: pre-wrap; word-break: break-all; overflow-y: auto; flex-grow: 1; padding-top: 6px; }

        /* ── Main view ── */
        #main-view { flex-grow: 1; display: flex; flex-direction: column; background: #111; }
        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* ── Playback bar ── */
        #playback-bar { height: 56px; background: #1e1e1e; border-top: 2px solid #3a3a3a; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
        #timeline-wrapper { flex-grow: 1; position: relative; display: flex; align-items: center; height: 100%; }
        #timeline { width: 100%; cursor: pointer; accent-color: #f39c12; }
        #age-markers { position: absolute; inset: 0; pointer-events: none; }
        .age-marker { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 3px; border-radius: 2px; cursor: help; pointer-events: auto; }
        .age-marker-lbl { position: absolute; top: calc(100% + 2px); left: 50%; transform: translateX(-50%); font-size: 9px; font-family: monospace; font-weight: bold; white-space: nowrap; }
        #time-display { font-family: monospace; font-size: 13px; width: 62px; color: #2ecc71; flex-shrink: 0; }

        /* ── Buttons ── */
        button { background: #f39c12; color: #111; border: none; padding: 5px 11px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 13px; }
        button:hover { background: #e67e22; }
        #btn-speed { background: #383838; color: #ccc; width: 40px; }
        #btn-browse { background: #2980b9; color: #fff; }

        /* ── Tooltip ── */
        #tooltip { display: none; position: fixed; background: #181818; border: 1px solid #484848; border-radius: 4px; padding: 6px 10px; font-size: 12px; pointer-events: none; z-index: 9999; max-width: 200px; line-height: 1.7; box-shadow: 0 3px 10px rgba(0,0,0,0.6); }
        .tt-name { font-weight: bold; color: #ddd; }
        .tt-owner { color: #666; font-size: 11px; }
        .tt-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>AgeVis Engine <span class="badge-1v1">1v1</span></h2>

    <div id="dropzone">
        <span id="status">Initializing Engine…</span>
        <small>1v1 replays only — .aoe2record</small><br>
        <input type="file" id="file-input" accept=".aoe2record" style="display:none">
        <button id="btn-browse" style="display:none; margin-top:10px;">📂 Browse File</button>
    </div>

    <div class="card" id="p1-card">
        <div class="card-header">
            <span class="card-name" id="p1-name">P1</span>
            <span class="card-civ"  id="p1-civ"></span>
        </div>
        <div class="card-stats">
            <span>Pop (alive/total)</span> <span class="val val-pop" id="p1-pop">—</span>
            <span>Buildings</span>         <span class="val val-bld" id="p1-bld">—</span>
            <span>APM (60s)</span>         <span class="val val-apm" id="p1-apm">—</span>
        </div>
    </div>

    <div class="card" id="p2-card">
        <div class="card-header">
            <span class="card-name" id="p2-name">P2</span>
            <span class="card-civ"  id="p2-civ"></span>
        </div>
        <div class="card-stats">
            <span>Pop (alive/total)</span> <span class="val val-pop" id="p2-pop">—</span>
            <span>Buildings</span>         <span class="val val-bld" id="p2-bld">—</span>
            <span>APM (60s)</span>         <span class="val val-apm" id="p2-apm">—</span>
        </div>
    </div>

    <div class="log-toolbar">
        <span id="log-count">0 events</span>
        <button class="log-btn" id="btn-copy">Copy</button>
        <button class="log-btn" onclick="Logger.clear()">Clear</button>
        <button class="log-btn" id="btn-reset-cache" title="Delete Pyodide IndexedDB cache and reload. Use if engine fails to boot after a browser update.">↺ Cache</button>
    </div>
    <div id="log"></div>
</div>

<div id="main-view">
    <div id="canvas-container"></div>
    <div id="playback-bar">
        <button id="btn-play">▶ Play</button>
        <button id="btn-speed">1x</button>
        <span id="time-display">00:00:00</span>
        <div id="timeline-wrapper">
            <input type="range" id="timeline" min="0" max="100" value="0" disabled>
            <div id="age-markers"></div>
        </div>
    </div>
</div>

<div id="tooltip"></div>

<script>
// ============================================================
// 1. CONFIG & STATE
// ============================================================
const Config = {
    CANVAS_SIZE: 750,
    PLAYER_COLORS: {
        1: 0x0066FF, 2: 0xFF2020, 3: 0x00CC44, 4: 0xDDDD00,
        5: 0x00CCCC, 6: 0xFF44FF, 7: 0x888888, 8: 0xFF8800,
    },
    TERRAIN_COLORS: {
        0:'#3b823b', 1:'#2A3B9A', 2:'#1E592F', 9:'#3d7031', 10:'#112E0E',
        12:'#82643a', 13:'#6e522b', 14:'#ab8854', 19:'#183815',
        22:'#1A2B15', 24:'#999999', _:'#4a5e3d',
    },
    GAIA_COLORS:  { gold:'#f0c030', stone:'#aaaaaa', relic:'#ffffaa' },
    AGE_COLORS:   { Feudal:'#f39c12', Castle:'#e74c3c', Imperial:'#9b59b6' },
    SPEED_CYCLE:  [1, 2, 4, 8, 16],
};

window.AgeVisState = {
    pyodide:    null,
    aoeData:    {},
    rawPayload: null,
    paths:      {},
    apm:        {},
    mapScale:   1,
    playback:   { isPlaying: false, currentTime: 0, lastFrameTime: 0, speed: 1 },
    pixi:       { app: null, container: null, bg: null },
};

// ============================================================
// 2. LOGGER
//    Counters are tracked as plain ints — no innerHTML regex.
// ============================================================
const Logger = (() => {
    const dom   = document.getElementById('log');
    const stat  = document.getElementById('status');
    const cntEl = document.getElementById('log-count');
    const COLORS = { info:'#3498db', success:'#2ecc71', error:'#e74c3c', warning:'#f39c12' };
    let total = 0, errs = 0, warns = 0;

    function refreshCount() {
        const parts = [`${total} events`];
        if (errs)  parts.push(`${errs} err`);
        if (warns) parts.push(`${warns} warn`);
        cntEl.innerText   = parts.join(' · ');
        cntEl.style.color = errs ? '#e74c3c' : '#666';
    }

    return {
        log(msg, type = 'info', obj = null) {
            const time = new Date().toLocaleTimeString([], { hour12: false });
            let extra = '';
            if (type === 'error' && obj) {
                const trace = obj.stack ? obj.stack.split('\n').slice(0, 3).join('\n    ') : String(obj);
                extra = `\n    ${trace}`;
            }
            dom.innerHTML =
                `<span style="color:#4a4a4a">[${time}]</span> ` +
                `<span style="color:${COLORS[type]}">${msg}</span>` +
                (extra ? `<span style="color:#5a3333;font-size:10.5px">${extra}</span>` : '') +
                '<br>' + dom.innerHTML;

            total++;
            if (type === 'error')   { errs++;  console.error('[AgeVis]', msg, obj ?? ''); }
            if (type === 'warning') { warns++; console.warn('[AgeVis]', msg, obj ?? ''); }
            else console.log('[AgeVis]', msg, obj ?? '');
            refreshCount();
        },

        status(msg, hex) { stat.innerText = msg; stat.style.color = hex; },

        clear() { dom.innerHTML = ''; total = errs = warns = 0; refreshCount(); },

        // FIX: proper .then(onSuccess, onFailure) — setTimeout was previously
        // passed as the rejection handler, which invoked it immediately.
        copyToClipboard() {
            navigator.clipboard.writeText(dom.innerText).then(
                () => {
                    const b = document.getElementById('btn-copy');
                    b.innerText = 'Copied!';
                    setTimeout(() => { b.innerText = 'Copy'; }, 1500);
                },
                () => Logger.log('Clipboard write failed (permissions?)', 'warning')
            );
        },
    };
})();
document.getElementById('btn-copy').addEventListener('click', () => Logger.copyToClipboard());

document.getElementById('btn-reset-cache').addEventListener('click', (() => {
    let armed = false, countdown = 0, ticker = null;
    function disarm() {
        armed = false; countdown = 0;
        clearInterval(ticker); ticker = null;
        const btn = document.getElementById('btn-reset-cache');
        btn.innerText   = '↺ Cache';
        btn.style.color = '';
    }
    return async function() {
        const btn = document.getElementById('btn-reset-cache');
        if (!armed) {
            armed = true; countdown = 5;
            btn.innerText   = `↺ Sure? (${countdown}s)`;
            btn.style.color = '#f39c12';
            ticker = setInterval(() => {
                countdown--;
                if (countdown <= 0) { disarm(); return; }
                btn.innerText = `↺ Sure? (${countdown}s)`;
            }, 1000);
            return;
        }
        disarm();
        btn.innerText   = 'Clearing…';
        btn.style.color = '#e74c3c';
        try {
            const dbs = await indexedDB.databases();
            await Promise.all(dbs.map(db => new Promise((res, rej) => {
                const req = indexedDB.deleteDatabase(db.name);
                req.onsuccess = res; req.onerror = rej; req.onblocked = res;
            })));
        } catch (_) {
            // Firefox may not support indexedDB.databases() — fall back to known Pyodide DB name
            await new Promise((res, rej) => {
                const req = indexedDB.deleteDatabase('pyodide');
                req.onsuccess = res; req.onerror = rej; req.onblocked = res;
            });
        }
        location.reload();
    };
})());

// ============================================================
// 3. ENGINE BOOT
// ============================================================
const Core = {
    boot: async () => {
        try {
            Logger.log('Booting PixiJS v8 WebGL engine…');
            // FIX: Instantiate here, not at parse time.
            // Constructing PIXI.Application() at module scope causes two WebGL
            // probe contexts (isWebGLSupported, maxRecommendedTextures) to be
            // created and immediately lost before init() even runs.
            AgeVisState.pixi.app       = new PIXI.Application();
            AgeVisState.pixi.container = new PIXI.Container();
            await AgeVisState.pixi.app.init({
                width: Config.CANVAS_SIZE, height: Config.CANVAS_SIZE,
                backgroundColor: 0x111111,
            });
            document.getElementById('canvas-container').appendChild(AgeVisState.pixi.app.canvas);
            AgeVisState.pixi.app.stage.addChild(AgeVisState.pixi.container);
            AgeVisState.pixi.container.eventMode          = 'static';
            AgeVisState.pixi.container.interactiveChildren = true;

            // FIX: Tooltip.init() binds a canvas mousemove listener.
            // Must be called exactly once, here, not inside initPlayback()
            // where it would leak a new listener on every replay load.
            Tooltip.init();

            Logger.log('Fetching Genie Engine unit data…');
            const res = await fetch('https://raw.githubusercontent.com/SiegeEngineers/aoe2techtree/master/data/data.json');
            if (!res.ok) throw new Error(`data.json fetch failed: ${res.status} ${res.statusText}`);
            const raw = await res.json();

            // aoe2techtree structure can vary — probe all known paths
            const topKeys  = Object.keys(raw).slice(0, 8);
            const dataKeys = Object.keys(raw.data  || {}).slice(0, 12);
            Logger.log(`data.json top-level keys: [${topKeys.join(', ')}]`);
            Logger.log(`data.json raw.data keys:  [${dataKeys.join(', ')}]`);
            const uData = raw.data?.Unit     ?? raw.data?.units    ?? raw.units    ?? {};
            const bData = raw.data?.Building  ?? raw.data?.buildings ?? raw.buildings ?? {};
            Logger.log(`Unit entries: ${Object.keys(uData).length}, Building entries: ${Object.keys(bData).length}`);

            Object.values(uData).forEach(u => { AgeVisState.aoeData[u.ID ?? u.id] = { ...u, render_shape: 'circle', size: 2 }; });
            Object.values(bData).forEach(b => { AgeVisState.aoeData[b.ID ?? b.id] = { ...b, render_shape: 'square', size: 5 }; });
            const defined = Object.keys(AgeVisState.aoeData).length;
            if (defined === 0) Logger.log('WARNING: 0 unit definitions loaded — unit labels will fall back to type IDs. Check data.json key paths above.', 'warning');
            else Logger.log(`${defined} unit/building definitions loaded.`, 'success');

            Logger.log('Initializing Pyodide WASM runtime…');
            AgeVisState.pyodide = await loadPyodide();
            // zstandard bundled in Pyodide ≥0.26. Older cached builds may not have it.
            // Fallback chain: loadPackage → micropip → warn and continue.
            // mgz only needs zstandard for zstd-compressed DE replays; most replays use zlib.
            // hashlib is unvendored from the stdlib in Pyodide 0.27.0+ — mgz.model imports it.
            await AgeVisState.pyodide.loadPackage(['micropip', 'hashlib']);
            try {
                await AgeVisState.pyodide.loadPackage(['zstandard']);
                Logger.log('zstandard loaded.', 'success');
            } catch (_) {
                try {
                    await AgeVisState.pyodide.runPythonAsync("import micropip; await micropip.install('zstandard')");
                    Logger.log('zstandard loaded via micropip.', 'success');
                } catch (__) {
                    Logger.log('zstandard unavailable — zstd-compressed replays will fail. Clear browser cache to force Pyodide 0.27.', 'warning');
                }
            }
            await AgeVisState.pyodide.runPythonAsync(Parser.PY_BOOT);

            Logger.status('Ready — drop or select a replay', '#2ecc71');
            const dz = document.getElementById('dropzone');
            dz.style.borderColor = '#2ecc71';
            dz.style.background  = '#111f11';
            document.getElementById('btn-browse').style.display = 'inline-block';
            Logger.log('Engine ready.', 'success');
            UI.bindDropzone();
            UI.bindKeys();
        } catch (err) {
            Logger.status('Engine boot failed', '#e74c3c');
            Logger.log(`Boot error: ${err.message}`, 'error', err);
        }
    },
};

// ============================================================
// 4. PYTHON STRINGS
// ============================================================
const Parser = {

    // Bootstraps mgz + construct from PyPI tarballs.
    // micropip cannot install C extensions or packages without WASM wheels —
    // we fetch .tar.gz sources directly and inject them into sys.path.
    PY_BOOT: `
import json, tarfile, io, sys, sysconfig
from pyodide.http import pyfetch

async def install_tarball(pkg_name, version=""):
    url  = f"https://pypi.org/pypi/{pkg_name}/{version}/json" if version else f"https://pypi.org/pypi/{pkg_name}/json"
    meta = await (await pyfetch(url)).json()
    if "urls" not in meta:
        raise ValueError(f"PyPI lookup failed for {pkg_name}: {meta}")
    tar_url   = next(u["url"] for u in meta["urls"] if u["url"].endswith(".tar.gz"))
    tar_bytes = await (await pyfetch(tar_url)).bytes()
    tar  = tarfile.open(fileobj=io.BytesIO(tar_bytes), mode="r:gz")
    site = sysconfig.get_paths()["purelib"]
    # filter="data" suppresses Python 3.12 DeprecationWarning and is the safe default
    tar.extractall(site, **({'filter': 'data'} if sys.version_info >= (3, 12) else {}))
    sys.path.append(f"{site}/{meta['info']['name']}-{meta['info']['version']}")

await install_tarball("construct", "2.10.67")
await install_tarball("aocref")
await install_tarball("mgz")

# construct 2.10.67 is Python 3.12 compatible but removed Embedded.
# mgz 1.8.51 still imports Embedded from construct at module level.
# Inject a shim BEFORE mgz is ever imported so the import succeeds.
#
# Embedded in 2.8.x set flagembedded=True on a Subconstruct, which caused
# Struct._parse to merge fields into the parent context. construct 2.10.67
# removed the entire flagembedded mechanism.
#
# For DE replays, mgz uses the fast header parser (struct-based, no construct
# Struct evaluation), so the shim only needs to survive import — it will not
# be called at parse time on DE files. For HD/UP replays it will be called;
# the passthrough behaviour is best-effort but prevents crashing.
import construct, construct.core

class _Embedded(construct.Subconstruct):
    r"""Shim for construct 2.8.x Embedded — merges subcon fields into parent."""
    def __init__(self, subcon):
        super().__init__(subcon)
    def _parse(self, stream, context, path):
        obj = self.subcon._parsereport(stream, context, path)
        # Attempt the merge that the original Embedded performed
        if hasattr(obj, "items"):
            for k, v in obj.items():
                if not k.startswith("_"):
                    context[k] = v
        return obj
    def _build(self, obj, stream, context, path):
        return self.subcon._build(obj, stream, context, path)
    def _sizeof(self, context, path):
        return self.subcon._sizeof(context, path)

construct.Embedded = _Embedded
construct.core.Embedded = _Embedded

# construct 2.8.x: String(length, encoding=None, padchar=bytes([0]), paddir, trimdir)
# construct 2.10.67: removed; nearest equivalent is PaddedString(length, encoding)
# but encoding is required there and it doesn't accept padchar/paddir/trimdir.
# Build the shim from 2.10.67 primitives that ARE available.
def _String(length, encoding=None, padchar=None, paddir="right", trimdir="right"):
    pad = padchar[:1] if padchar else bytes([0])
    inner = construct.core.FixedSized(length, construct.core.NullStripped(construct.core.GreedyBytes, pad=pad))
    if encoding:
        return construct.core.StringEncoded(inner, encoding)
    return inner

construct.String      = _String
construct.core.String = _String

# ── Python 3.12 / construct 2.10.67 shim: Enum.__init__ ────────────────────
# mgz/enums.py calls Enum(subcon, self=1, ally=2, ...) — "self" is a valid
# AoE2 diplomacy stance name. Python 3.12 tightened keyword-argument handling:
# passing self=<val> now always conflicts with the implicit first positional
# parameter named "self". Fix: replace __init__ with one whose first param is
# named _self, so self=1 lands in **mapping without conflict.
from construct.core import EnumIntegerString as _EIS
def _enum_init(_self, subcon, *merge, **mapping):
    construct.core.Subconstruct.__init__(_self, subcon)
    for enum in merge:
        for enumentry in enum:
            mapping[enumentry.name] = enumentry.value
    _self.encmapping = {_EIS.new(v, k): v for k, v in mapping.items()}
    _self.decmapping = {v: _EIS.new(v, k) for k, v in mapping.items()}
    _self.ksymapping = {v: k for k, v in mapping.items()}
construct.core.Enum.__init__ = _enum_init
construct.Enum.__init__      = _enum_init

# ── Python 3.12 / construct 2.10.67 shim: PascalString ────────────────────
# construct 2.10.67 made encoding a required arg; mgz calls PascalString(lf)
# without encoding. Default to utf8 (matches prior behaviour).
from construct.core import StringEncoded as _SE, Prefixed as _Pref, GreedyBytes as _GB
def _PascalString(lengthfield=None, encoding="utf8", **kw):
    if lengthfield is None:
        lengthfield = kw.get("lengthfield")
    return _SE(_Pref(lengthfield, _GB), encoding)
construct.PascalString      = _PascalString
construct.core.PascalString = _PascalString

# ── Python 3.12 / construct 2.10.67 shim: CString encoding map ─────────────
# construct 2.10.67's encodingunit() only accepts ascii/utf8/utf16/utf32 family.
# mgz calls CString(encoding='latin1'); map it to ascii (both single-byte,
# latin1 is a superset but the null-terminator scan is identical).
_origCString = construct.core.CString
def _CString(encoding="utf8", **kw):
    _map = {"latin1": "ascii", "latin-1": "ascii", "iso-8859-1": "ascii"}
    return _origCString(_map.get(encoding, encoding))
construct.CString      = _CString
construct.core.CString = _CString

# ── construct 2.10.67 shim: _read_stream ───────────────────────────────────
# mgz/util.py MgzPrefixed._parse calls construct.core._read_stream(stream, n).
# Removed in 2.10.67; replaced by stream_read(stream, length, path).
construct.core._read_stream = lambda stream, length: construct.core.stream_read(stream, length, "(shim)")

# ── construct 2.10.67 shim: mgz.util _decode signatures ────────────────────
# construct 2.10.67 added a required "path" arg to Tunnel._decode and
# Adapter._decode. All five mgz.util subclasses still have the old 2-arg
# (self, data, context) signature. Wrap each to accept and ignore path.
import mgz.util as _mu
def _wrap_decode(fn):
    def _d(self, data, context, path=None): return fn(self, data, context)
    return _d
for _cls in (_mu.ZlibCompressed, _mu.TimeSecAdapter, _mu.BoolAdapter,
             _mu.VersionAdapter, _mu.ModVersionAdapter):
    _cls._decode = _wrap_decode(_cls._decode)

# ── save >= 67.x: fix civ_selection over-consumption ──────────────────────
# Binary analysis of save_version=67.20:
# At save >= 67.x the player-slot layout adds field_A (available-civ count)
# before field_B (selected civ, always 1 entry when field_A > 0).
# mgz reads civ_count=field_A then loops that many times, which over-reads
# when field_A > 1 (e.g. field_A=24 for the second human player).

# Trailing +8 bytes needle — using chr(10) not backslash-n (avoids JS template literal splitting)

_return_needle = "    return dict(" + _nl + "        players="

    _ns = {}

    exec(compile(_patched, "parse_de_patched_67x", "exec"), _ns)

# ── save >= 67.x: string_block crc uint32 → uint64 ─────────────────────────
# Binary analysis: string_block reads crc(4B) then de_string. At save 67.x
# the crc field grew to 8 bytes (uint64). The extra 4 bytes are always zero.
# Adaptive fix: after reading crc(4B), if crc==0 and next 2 bytes are NOT
# 0x600A, consume 4 more bytes. Works for all save versions without needing
# the save parameter in scope.
import struct as _struct_sb

def _string_block_patched(data):
    strings = []
    while True:
        pos = data.tell()
        b4 = data.read(4)
        if len(b4) < 4:
            break
        crc = _struct_sb.unpack("<I", b4)[0]
        if 0 < crc < 255:
            break
        if crc == 0:
            peek = data.read(2)
            if peek != b"\\x60\\x0a":
                data.read(2)
            else:
                data.seek(data.tell() - 2)
        ds_pos = data.tell()
        magic = data.read(2)
        if magic != b"\\x60\\x0a":
            data.seek(pos)
            break
        length = _struct_sb.unpack("<h", data.read(2))[0]
        strings.append(data.read(length).decode("utf-8").split(":"))
    return strings

_mfh.string_block = _string_block_patched
# Also inject into _ns so the exec'd parse_de finds it when it calls string_block
if "_ns" in dir():
    _ns["string_block"] = _string_block_patched
print("[AgeVis-py] string_block patched for save >= 67.x", file=_sys.stderr)

    // Single-pass extractor — written against mgz 1.8.51 / ModelSummary API.
    //
    // Key API facts discovered from source inspection:
    // API notes (mgz 1.8.51) — two distinct code paths depending on replay version:
    //
    // ModelSummary (DE replays, save_version > 13.34):
    //   s.match.actions  — list of Action dataclasses
    //     .timestamp     — timedelta  → .total_seconds()*1000 for ms
    //     .type          — ActionEnum
    //     .player        — Player dataclass or None  → .number for pid
    //     .position      — Position or None  → .x/.y (enrich_action moved coords here)
    //     .payload       — dict  → object_ids still here
    //   s.match.uptimes  — list of Uptime dataclasses for age-ups
    //     .timestamp     — timedelta
    //     .age           — Age enum  → .name e.g. "FEUDAL_AGE"
    //     .player        — Player dataclass
    //   s.match.players  — civ as string name  (get_players() gives int ID)
    //
    // FullSummary (HD/UP/older replays):
    //   s._actions       — list of (duration_ms:int, ActionEnum, payload_dict)
    //     payload_dict   — raw fast-parse output; x/y coords ARE in dict directly
    //     player_id      — in payload_dict["player_id"]
    //   s.get_chat()     — list of dicts; filter type==Chat.AGE for age-ups
    //     chat["age"]    — Age enum  → .name e.g. "FEUDAL_AGE"
    //     chat["player_number"], chat["timestamp"] (ms int)
    //   s.get_players()  — civ as int (civilization ID, not name)
    //
    // Both paths share:
    //   get_objects()    — returns dict {"objects":[...], "tcs":...}, NOT a bare list
    //   object type field is "object_id" (not "object_type")
    //   gaia player_number is None (not 0)
    //   get_map()["dimension"] for tile count int; ["size"] is a string ("Large")
    //   tile terrain field is "terrain_id" (not "terrain_type")
    PY_EXTRACT: `
import json, traceback
from mgz.summary import Summary
from mgz.fast import Action as ActionEnum
from mgz.common.chat import Chat as ChatType

PLAYER_IDS   = {1, 2, 3, 4, 5, 6, 7, 8}
RESOURCE_IDS = {66: "gold", 102: "stone", 285: "relic"}
AGE_MAP      = {"FEUDAL_AGE": "Feudal", "CASTLE_AGE": "Castle", "IMPERIAL_AGE": "Imperial"}
# Action types that carry destination coordinates + object_ids in both paths
MOVE_TYPES   = {ActionEnum.MOVE, ActionEnum.ORDER, ActionEnum.PATROL, ActionEnum.DE_ATTACK_MOVE}
MOVE_OR_BUILD = MOVE_TYPES | {ActionEnum.BUILD}

try:
    # Probe save_version before attempting full parse so we can log it.
    # decompress + parse_version are the same calls Summary() makes internally.
    import struct as _struct, zlib as _zlib
    from mgz.fast.header import decompress as _decompress, parse_version as _pv
    from mgz.model.compat import ModelSummary
    from mgz.summary.full import FullSummary
    from mgz.util import Version as _Version

    with open("/replay.rec", "rb") as _f:
        _raw = _f.read()
    _buf = __import__("io").BytesIO(_raw)
    try:
        _hdr = _decompress(_buf)
        _ver, _gver, _save, _log = _pv(_hdr, _buf)
        _save_str = f"{_save:.2f}"
        _is_de = (_ver is _Version.DE and _save > 13.34)
    except Exception as _e:
        _save_str = "unknown"
        _is_de = False

    # Log the version so parse failures are diagnosable.
    print(f"[AgeVis-py] save_version={_save_str}, is_de={_is_de}")

    _buf.seek(0)
    if _is_de:
        # Bypass Summary() fallback — it swallows the real ModelSummary error
        # into Python's logging module where we can't see it. Call directly.
        try:
            s = ModelSummary(_buf)
        except RuntimeError as _e:
            raise RuntimeError(f"DE fast-parse failed (save={_save_str}): {_e}")
    else:
        s = FullSummary(_buf)

    is_model = hasattr(s, "match")  # True → ModelSummary, False → FullSummary

    # ── Objects ─────────────────────────────────────────────────────────────
    # get_objects() → dict {"objects":[...], "tcs":...} on BOTH paths
    obj_wrap = s.get_objects()
    all_objs = obj_wrap.get("objects", []) if isinstance(obj_wrap, dict) else list(obj_wrap)

    init_objs = [
        {"id": o.get("instance_id"), "p": o.get("player_number"),
         "x": o.get("x"), "y": o.get("y"), "type_id": o.get("object_id")}
        for o in all_objs
        if o.get("instance_id") is not None and o.get("player_number") in PLAYER_IDS
    ]
    gaia = [
        {"x": o.get("x"), "y": o.get("y"), "rt": RESOURCE_IDS[o.get("object_id")]}
        for o in all_objs
        if o.get("player_number") is None          # gaia is None, NOT 0
        and o.get("object_id") in RESOURCE_IDS
        and o.get("x") is not None
    ]

    # ── Map ──────────────────────────────────────────────────────────────────
    # get_map()["size"] is a string ("Large"); use ["dimension"] for the int
    map_data = s.get_map()
    dim = map_data.get("dimension") or map_data.get("size")
    if isinstance(dim, str):
        SIZE_LUT = {"Tiny":72,"Small":96,"Medium":120,"Normal":120,
                    "Large":144,"Giant":168,"Ludikris":200}
        dim = SIZE_LUT.get(dim, 120)
    # tile terrain field is "terrain_id" on both paths
    tiles = [
        [t.get("terrain_id") or t.get("terrain_type", 0), t.get("elevation", 0)]
        for t in map_data.get("tiles", [])
    ]

    # ── Players ──────────────────────────────────────────────────────────────
    players = []
    if is_model:
        # ModelSummary: match.players has civ as string name
        for p in sorted(s.match.players, key=lambda x: x.number):
            players.append({"name": p.name,
                            "civ":  p.civilization or str(p.civilization_id),
                            "color": p.color_id})
    else:
        # FullSummary: get_players() returns civilization as int (the ID)
        for p in s.get_players():
            civ = p.get("civilization")
            players.append({"name": p["name"],
                            "civ":  civ if isinstance(civ, str) else str(civ or "?"),
                            "color": p["color_id"]})

    # ── Commands & APM ───────────────────────────────────────────────────────
    commands = []
    apm_ts   = {"1": [], "2": []}

    if is_model:
        # ── ModelSummary (DE) ────────────────────────────────────────────────
        # Actions are dataclasses: timestamp=timedelta, player=Player|None,
        # position=Position|None (coords moved here by enrich_action), payload=dict
        for action in s.match.actions:
            ts  = int(action.timestamp.total_seconds() * 1000)
            pid = action.player.number if action.player else None
            if pid in (1, 2):
                apm_ts[str(pid)].append(ts)

            ids = action.payload.get("object_ids")
            if action.type in MOVE_OR_BUILD and action.position and ids:
                commands.append({"t": ts, "type": "move", "ids": ids,
                                 "x": action.position.x, "y": action.position.y, "p": pid})
            elif action.type is ActionEnum.DELETE and ids:
                commands.append({"t": ts, "type": "delete", "ids": ids})
            elif action.type is ActionEnum.RESIGN and pid:
                commands.append({"t": ts, "type": "resign", "p": pid})

        # Age-ups: Uptime dataclasses (timestamp=timedelta, age=AgeEnum, player=Player)
        for uptime in s.match.uptimes:
            ts    = int(uptime.timestamp.total_seconds() * 1000)
            pid   = uptime.player.number if uptime.player else None
            aname = AGE_MAP.get(uptime.age.name if uptime.age else "", "")
            if pid and aname:
                commands.append({"t": ts, "type": "age_up", "p": pid, "age": aname})

    else:
        # ── FullSummary (HD/UP/older) ────────────────────────────────────────
        # s._actions is a list of (duration_ms:int, ActionEnum, payload_dict)
        # Coordinates are in payload_dict["x"]/["y"] directly (not enriched).
        # player_id is in payload_dict["player_id"].
        for ts, atype, adict in s._actions:
            pid = adict.get("player_id")
            if pid in (1, 2):
                apm_ts[str(pid)].append(ts)

            ids = adict.get("object_ids")
            x, y = adict.get("x"), adict.get("y")
            if atype in MOVE_OR_BUILD and x is not None and ids:
                commands.append({"t": ts, "type": "move", "ids": ids,
                                 "x": x, "y": y, "p": pid})
            elif atype is ActionEnum.DELETE and ids:
                commands.append({"t": ts, "type": "delete", "ids": ids})
            elif atype is ActionEnum.RESIGN and pid:
                commands.append({"t": ts, "type": "resign", "p": pid})

        # Age-ups: in-game chat messages parsed as Chat.AGE type.
        # chat["age"] is an Age enum; chat["timestamp"] is ms int; chat["player_number"] is int.
        for chat in s.get_chat():
            if chat.get("type") is not ChatType.AGE:
                continue
            age_enum = chat.get("age")
            aname    = AGE_MAP.get(age_enum.name if age_enum else "", "")
            pid      = chat.get("player_number")
            ts       = chat.get("timestamp", 0)
            if pid and aname:
                commands.append({"t": ts, "type": "age_up", "p": pid, "age": aname})

    payload = {
        "duration":  s.get_duration(),
        "map_size":  dim,
        "tiles":     tiles,
        "players":   players,
        "objects":   init_objs,
        "commands":  commands,
        "gaia":      gaia,
        "apm_ts":    apm_ts,
    }
    result = json.dumps({"status": "ok", "data": payload})
except Exception as exc:
    result = json.dumps({"status": "error", "message": str(exc), "trace": traceback.format_exc()})
result
    `,

            AgeVisState.pyodide.FS.writeFile('/replay.rec', new Uint8Array(await file.arrayBuffer()));

            if (result.status === 'error') {

            AgeVisState.rawPayload = result.data;
            Logger.log(`Parsed OK — ${result.data.objects.length} entities, ${result.data.commands.length} commands.`, 'success');

            Simulation.compilePaths();
            Simulation.compileAPM();
            Simulation.cullCombatDeaths();
            Render.buildTerrainCache();
            UI.initPlayback();

            Logger.status('Ready.', '#2ecc71');
            Logger.log(`Tracking ${Object.keys(AgeVisState.paths).length} entities.`, 'success');
        } catch (err) {
            Logger.log(`Parse error: ${err.message}`, 'error', err);
            Logger.status('Parsing failed', '#e74c3c');

    },
};

// ============================================================
// 5. MATH
// ============================================================
const MathUtils = {
    getPosAtTime(path, t) {
        if (!path?.length) return null;
        let pos = { x: path[0].x, y: path[0].y };
        for (let i = 0; i < path.length - 1; i++) {
            if (t >= path[i].t && t <= path[i+1].t) {
                const dt   = path[i+1].t - path[i].t;
                const prog = dt === 0 ? 1 : (t - path[i].t) / dt;
                pos.x = path[i].x + (path[i+1].x - path[i].x) * prog;
                pos.y = path[i].y + (path[i+1].y - path[i].y) * prog;
                return { pos, isMoving: true, lastT: path[i].t };
            }
            if (t > path[i+1].t) { pos.x = path[i+1].x; pos.y = path[i+1].y; }
        }
        return { pos, isMoving: false, lastT: path[path.length - 1].t };
    },
};

// ============================================================
// 6. SIMULATION
// ============================================================
const Simulation = {
    compilePaths() {
        Object.values(AgeVisState.paths).forEach(ep => ep.gfx?.destroy());
        AgeVisState.paths    = {};
        AgeVisState.mapScale = Config.CANVAS_SIZE / AgeVisState.rawPayload.map_size;

        const fallback = { render_shape: 'circle', Speed: 1.1, size: 2 };

        // Seed T=0 entity snapshot
        for (const obj of AgeVisState.rawPayload.objects) {
            if (obj.x == null || obj.y == null) continue;
            const stat  = AgeVisState.aoeData[obj.type_id] ?? fallback;
            const label = (stat.internal_name ?? stat.name ?? `type:${obj.type_id ?? '?'}`).replace(/_/g, ' ');
            const ep = Simulation._makeEntity(
                [{ t: 0, x: obj.x, y: obj.y, p: obj.p,
                   speed: stat.Speed ?? stat.speed ?? 1.1,
                   shape: stat.render_shape, size: stat.size }],
                label
            );
            AgeVisState.paths[obj.id] = ep;
        }

        // Walk command stream in time order
        const cmds = [...AgeVisState.rawPayload.commands].sort((a, b) => a.t - b.t);
        for (const cmd of cmds) {
            if (cmd.type === 'resign') {
                for (const ep of Object.values(AgeVisState.paths)) {
                    if (ep.path[0]?.p === cmd.p)
                        ep.deathTime = Math.min(ep.deathTime ?? Infinity, cmd.t);
                }
                continue;
            }
            if (cmd.type === 'delete') {
                for (const id of (cmd.ids ?? [])) {
                    if (AgeVisState.paths[id]) AgeVisState.paths[id].deathTime = cmd.t;
                }
                continue;
            }
            // FIX: age_up commands have no `ids` field — previously fell through
            // into cmd.ids.forEach() and threw TypeError on every replay load.
            if (cmd.type === 'age_up' || !cmd.ids) continue;

            for (const uid of cmd.ids) {
                if (!AgeVisState.paths[uid]) {
                    AgeVisState.paths[uid] = Simulation._makeEntity(
                        [{ t: cmd.t, x: cmd.x, y: cmd.y, p: cmd.p ?? null,
                           speed: 1.1, shape: 'circle', size: 2 }],
                        'Unknown Unit'
                    );
                }

                const path     = AgeVisState.paths[uid].path;
                let   lastNode = path[path.length - 1];

                if (lastNode.t > cmd.t) {
                    const prev = path[path.length - 2] ?? path[0];
                    const dt   = lastNode.t - prev.t;
                    const prog = dt === 0 ? 1 : (cmd.t - prev.t) / dt;
                    lastNode.t = cmd.t;
                    lastNode.x = prev.x + (lastNode.x - prev.x) * prog;
                    lastNode.y = prev.y + (lastNode.y - prev.y) * prog;
                } else if (lastNode.t < cmd.t) {
                    path.push({ ...lastNode, t: cmd.t });
                    lastNode = path[path.length - 1];
                }

                const dist = Math.hypot(cmd.x - lastNode.x, cmd.y - lastNode.y);
                const spd  = lastNode.speed > 0 ? lastNode.speed : 1.1;
                path.push({ ...lastNode, t: cmd.t + (dist / spd) * 1000, x: cmd.x, y: cmd.y });
            }
        }
    },

    // O(n²) combat death heuristic — fine for 1v1 entity counts
    cullCombatDeaths() {
        const ids = Object.keys(AgeVisState.paths);
        for (const id of ids) {
            const ep   = AgeVisState.paths[id];
            const path = ep.path;
            if (!path.length || ep.deathTime != null) continue;
            const last = path[path.length - 1];
            if (last.t > AgeVisState.rawPayload.duration - 15000) continue;

            for (const eid of ids) {
                if (eid === id) continue;
                const eEp = AgeVisState.paths[eid];
                if (eEp.path[0]?.p === last.p || eEp.path[0]?.p == null) continue;
                if (eEp.deathTime != null && eEp.deathTime < last.t) continue;
                const eState = MathUtils.getPosAtTime(eEp.path, last.t);
                if (!eState) continue;
                if (Math.hypot(last.x - eState.pos.x, last.y - eState.pos.y) <= 8) {
                    ep.deathTime = last.t + 3000;
                    break;
                }
            }
        }
    },

    compileAPM() {
        AgeVisState.apm = {};
        for (const [pid, ts] of Object.entries(AgeVisState.rawPayload.apm_ts ?? {})) {
            AgeVisState.apm[pid] = [...ts].sort((a, b) => a - b);
        }
    },

    _makeEntity(pathNodes, label) {
        const g = new PIXI.Graphics();
        g.eventMode = 'static';
        AgeVisState.pixi.container.addChild(g);
        const ep = { path: pathNodes, gfx: g, drawn: false, label };
        g.on('pointerover', () => { if (g.visible) Tooltip.show(ep); });
        g.on('pointerout',  () => Tooltip.hide());
        return ep;
    },
};

// ============================================================
// 7. RENDERER
// ============================================================
const Render = {
    buildTerrainCache() {
        if (AgeVisState.pixi.bg) {
            AgeVisState.pixi.app.stage.removeChild(AgeVisState.pixi.bg);
            AgeVisState.pixi.bg.destroy(true);
        }

        const size      = AgeVisState.rawPayload.map_size;
        const tileSize  = Config.CANVAS_SIZE / size;
        const offscreen = document.createElement('canvas');
        offscreen.width = offscreen.height = Config.CANVAS_SIZE;
        const ctx = offscreen.getContext('2d');

        // Terrain — row-major (y outer, x inner) matches mgz tile order
        let idx = 0;
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const [terrain, elev] = AgeVisState.rawPayload.tiles[idx++];
                const cx = x * tileSize;
                const cy = Config.CANVAS_SIZE - (y + 1) * tileSize;
                ctx.fillStyle = Config.TERRAIN_COLORS[terrain] ?? Config.TERRAIN_COLORS._;
                ctx.fillRect(cx, cy, tileSize, tileSize);
                if (elev > 0) {
                    ctx.fillStyle = `rgba(255,255,255,${elev * 0.12})`;
                    ctx.fillRect(cx, cy, tileSize, tileSize);
                }
            }
        }

        // Gaia resources — baked here, zero WebGL objects
        const r = Math.max(tileSize * 0.55, 3);
        ctx.globalAlpha = 0.82;
        for (const obj of (AgeVisState.rawPayload.gaia ?? [])) {
            if (obj.x == null) continue;
            ctx.beginPath();
            ctx.arc(obj.x * tileSize, Config.CANVAS_SIZE - obj.y * tileSize, r, 0, Math.PI * 2);
            ctx.fillStyle = Config.GAIA_COLORS[obj.rt] ?? '#888';
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // FIX: PIXI.Texture.fromCanvas() does not exist in PixiJS v8 and throws
        // TypeError at runtime. PIXI.Texture.from() is the correct v8 API for
        // canvas elements and goes through the v8 asset detection system.
        AgeVisState.pixi.bg = new PIXI.Sprite(PIXI.Texture.from(offscreen));
        AgeVisState.pixi.app.stage.addChildAt(AgeVisState.pixi.bg, 0);
    },

    drawFrame(timeMs) {
        if (!AgeVisState.rawPayload) return;
        const stats = { 1: { pA:0, pT:0, bA:0, bT:0 }, 2: { pA:0, pT:0, bA:0, bT:0 } };

        for (const ep of Object.values(AgeVisState.paths)) {
            const path = ep.path;
            const base = path[0];
            const g    = ep.gfx;
            const dead = ep.deathTime != null && timeMs >= ep.deathTime;

            if (timeMs >= base.t && (base.p === 1 || base.p === 2)) {
                const isBld   = base.shape === 'square' || base.shape === 'building';
                const bucket  = stats[base.p];
                if (isBld) { bucket.bT++; if (!dead) bucket.bA++; }
                else        { bucket.pT++; if (!dead) bucket.pA++; }
            }

            if (dead || timeMs < base.t) { g.visible = false; continue; }
            g.visible = true;

            if (!ep.drawn) {
                const rs = Math.max(base.size * (AgeVisState.mapScale / 4), 2);
                if (base.shape === 'square' || base.shape === 'building') g.rect(-rs, -rs, rs*2, rs*2);
                else g.circle(0, 0, rs);
                g.fill(Config.PLAYER_COLORS[base.p] ?? 0x666666);
                ep.drawn = true;
            }

            const state = MathUtils.getPosAtTime(path, timeMs);
            if (!state) continue;

            let alpha = 1;
            if (!state.isMoving && timeMs > state.lastT) {
                const idle = timeMs - state.lastT;
                if (idle > 60000) alpha = Math.max(0.3, 1 - (idle - 60000) / 60000);
            }
            g.alpha = alpha;
            g.x = state.pos.x * AgeVisState.mapScale;
            g.y = Config.CANVAS_SIZE - state.pos.y * AgeVisState.mapScale;
        }

        UI.updateTelemetry(timeMs, stats);
    },
};

// ============================================================
// 8. TOOLTIP & APM
// ============================================================
const Tooltip = {
    _el:    document.getElementById('tooltip'),
    _bound: false,

    // FIX: Must be called once from Core.boot(), never from initPlayback().
    // Calling from initPlayback() would add a fresh mousemove listener on
    // every replay file loaded — unbounded listener leak.
    init() {
        if (this._bound) return;
        this._bound = true;
        const canvas = AgeVisState.pixi.app.canvas;
        canvas.addEventListener('mousemove', (e) => {
            if (this._el.style.display === 'block') {
                this._el.style.left = (e.clientX + 14) + 'px';
                this._el.style.top  = (e.clientY - 56) + 'px';
            }
        });
        canvas.addEventListener('mouseleave', () => this.hide());
    },

    show(ep) {
        const base = ep.path[0];
        if (!base) return;
        const hex   = '#' + (Config.PLAYER_COLORS[base.p] ?? 0x666666).toString(16).padStart(6, '0');
        const pName = AgeVisState.rawPayload?.players[(base.p ?? 1) - 1]?.name ?? `Player ${base.p}`;
        this._el.innerHTML =
            `<div class="tt-name"><span class="tt-dot" style="background:${hex}"></span>${ep.label}</div>` +
            `<div class="tt-owner">${pName}</div>`;
        this._el.style.display = 'block';
    },

    hide() { this._el.style.display = 'none'; },
};

const APMCalc = {
    // O(log n) rolling 60-second window via binary search
    get(pid, timeMs) {
        const ts = AgeVisState.apm[pid];
        if (!ts?.length || timeMs < 500) return 0;
        const winStart = Math.max(0, timeMs - 60000);
        const winMs    = Math.min(timeMs, 60000);

        let lo = 0, hi = ts.length;
        while (lo < hi) { const m = (lo + hi) >> 1; ts[m] < winStart ? lo = m+1 : hi = m; }
        const startIdx = lo;
        lo = startIdx; hi = ts.length;
        while (lo < hi) { const m = (lo + hi) >> 1; ts[m] <= timeMs ? lo = m+1 : hi = m; }

        return Math.round((lo - startIdx) * (60000 / winMs));
    },
};

// ============================================================
// 9. UI & EVENTS
// ============================================================
const UI = {
    bindKeys() {
        // Space = play/pause; ←/→ = scrub ±10 s. Guard: no-op until a replay is loaded.
        // Ignore when focus is inside an input to avoid hijacking the file input or range.
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (!AgeVisState.rawPayload)       return;
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                UI.togglePlay();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                AgeVisState.playback.currentTime = Math.max(0, AgeVisState.playback.currentTime - 10000);
                document.getElementById('timeline').value = AgeVisState.playback.currentTime;
                Render.drawFrame(AgeVisState.playback.currentTime);
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                const cap = AgeVisState.rawPayload.duration;
                AgeVisState.playback.currentTime = Math.min(cap, AgeVisState.playback.currentTime + 10000);
                document.getElementById('timeline').value = AgeVisState.playback.currentTime;
                Render.drawFrame(AgeVisState.playback.currentTime);
            }
        });
    },

    bindDropzone() {
        const dz        = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');
        const btnBrowse = document.getElementById('btn-browse');

        dz.addEventListener('dragover',  (e) => { e.preventDefault(); dz.classList.add('drag-over'); });
        dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
        dz.addEventListener('drop', (e) => {
            e.preventDefault();
            dz.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) Parser.processFile(e.dataTransfer.files[0]);
        });
        btnBrowse.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
        dz.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) { Parser.processFile(e.target.files[0]); fileInput.value = ''; }
        });
    },

    initPlayback() {
        // Clone timeline to drop stale listeners from previous replay — same pattern as _rewire.
        // Raw addEventListener here (vs _rewire) was leaking one listener per replay load.
        const oldTl = document.getElementById('timeline');
        const tl    = oldTl.cloneNode(true);
        oldTl.parentNode.replaceChild(tl, oldTl);

        const dur = AgeVisState.rawPayload.duration;
        tl.max = dur; tl.disabled = false; tl.value = 0;

        // Player cards
        for (let i = 0; i < 2; i++) {
            const p = AgeVisState.rawPayload.players[i];
            if (!p) continue;
            const n   = i + 1;
            const col = '#' + (Config.PLAYER_COLORS[p.color] ?? 0xffffff).toString(16).padStart(6, '0');
            const card = document.getElementById(`p${n}-card`);
            card.style.display         = 'block';
            card.style.borderLeftColor = col;
            document.getElementById(`p${n}-name`).innerText = p.name;
            document.getElementById(`p${n}-civ`).innerText  = `(${p.civ})`;
        }

        // Age-up timeline markers
        const markerEl = document.getElementById('age-markers');
        markerEl.innerHTML = '';
        for (const ev of AgeVisState.rawPayload.commands.filter(c => c.type === 'age_up')) {
            const pct  = (ev.t / dur) * 100;
            const col  = Config.AGE_COLORS[ev.age] ?? '#fff';
            const name = AgeVisState.rawPayload.players[(ev.p ?? 1) - 1]?.name ?? `P${ev.p}`;
            const m    = document.createElement('div');
            m.className = 'age-marker';
            m.title     = `${name} → ${ev.age} Age`;
            m.style.cssText = `left:${pct}%;height:18px;background:${col};opacity:0.9;`;
            const lbl = document.createElement('span');
            lbl.className   = 'age-marker-lbl';
            lbl.style.color = col;
            lbl.innerText   = ev.age[0];
            m.appendChild(lbl);
            markerEl.appendChild(m);
        }

        // Replace buttons to drop stale listeners from previous replays
        UI._rewire('btn-play',  'click', UI.togglePlay);
        UI._rewire('btn-speed', 'click', UI.toggleSpeed);
        tl.addEventListener('input', (e) => {
            AgeVisState.playback.currentTime = +e.target.value;
            Render.drawFrame(AgeVisState.playback.currentTime);
        });

        Render.drawFrame(0);
    },

    _rewire(id, event, fn) {
        const el  = document.getElementById(id);
        const neo = el.cloneNode(true);
        el.parentNode.replaceChild(neo, el);
        neo.addEventListener(event, fn);
    },

    togglePlay() {
        const pb = AgeVisState.playback;
        pb.isPlaying = !pb.isPlaying;
        document.getElementById('btn-play').innerText = pb.isPlaying ? '⏸ Pause' : '▶ Play';
        if (pb.isPlaying) { pb.lastFrameTime = performance.now(); requestAnimationFrame(UI.tick); }
    },

    toggleSpeed() {
        const pb  = AgeVisState.playback;
        pb.speed  = Config.SPEED_CYCLE[(Config.SPEED_CYCLE.indexOf(pb.speed) + 1) % Config.SPEED_CYCLE.length];
        const btn = document.getElementById('btn-speed');
        btn.innerText   = pb.speed + 'x';
        btn.style.color = pb.speed >= 8 ? '#f39c12' : '#ccc';
    },

    tick(ts) {
        const pb = AgeVisState.playback;
        if (!pb.isPlaying) return;
        pb.currentTime   += (ts - pb.lastFrameTime) * pb.speed;
        pb.lastFrameTime  = ts;
        if (pb.currentTime >= AgeVisState.rawPayload.duration) {
            pb.currentTime = AgeVisState.rawPayload.duration;
            UI.togglePlay();
        }
        document.getElementById('timeline').value = pb.currentTime;
        Render.drawFrame(pb.currentTime);
        if (pb.isPlaying) requestAnimationFrame(UI.tick);
    },

    updateTelemetry(timeMs, stats) {
        document.getElementById('time-display').innerText = new Date(timeMs).toISOString().slice(11, 19);
        for (const n of [1, 2]) {
            const card = document.getElementById(`p${n}-card`);
            if (card.style.display !== 'block') continue;
            const s = stats[n];
            document.getElementById(`p${n}-pop`).innerText = `${s.pA} / ${s.pT}`;
            document.getElementById(`p${n}-bld`).innerText = `${s.bA} / ${s.bT}`;
            document.getElementById(`p${n}-apm`).innerText = APMCalc.get(String(n), timeMs);
        }
    },
};

// ============================================================
// BOOTSTRAP
// ============================================================
Core.boot();
</script>
